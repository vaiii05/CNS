
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CNS Cryptography Simulator</title>

<style>

body{
font-family:Arial;
background:#020617;
color:white;
display:flex;
justify-content:center;
padding:40px;
}

.container{
width:750px;
background:#0f172a;
padding:30px;
border-radius:12px;
box-shadow:0 0 30px rgba(0,255,255,0.2);
}

h1{
text-align:center;
color:#22d3ee;
}

label{
margin-top:10px;
display:block;
color:#94a3b8;
}

select,input,textarea{
width:100%;
padding:10px;
margin-top:5px;
border-radius:6px;
border:1px solid #1e293b;
background:#020617;
color:white;
}

textarea{
height:100px;
}

.buttons{
display:flex;
gap:10px;
margin-top:15px;
}

button{
flex:1;
padding:10px;
border:none;
background:#22d3ee;
color:black;
font-weight:bold;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#06b6d4;
}

.panel{
margin-top:20px;
background:#020617;
padding:15px;
border-radius:8px;
border:1px solid #1e293b;
white-space:pre-wrap;
}

.error{
color:#f87171;
}

</style>
</head>

<body>

<div class="container">

<h1>CNS Cryptography Simulator</h1>

<label>Algorithm</label>
<select id="algo">
<option value="caesar">Caesar Cipher</option>
<option value="vigenere">Vigenere Cipher</option>
<option value="playfair">Playfair Cipher</option>
<option value="hill">Hill Cipher (2x2)</option>
<option value="rail">Rail Fence Cipher</option>
<option value="column">Row/Column Transposition</option>
</select>

<label>Key</label>
<input id="key" placeholder="Enter key">

<label>Input Text</label>
<textarea id="text"></textarea>

<div class="buttons">
<button onclick="encrypt()">Encrypt</button>
<button onclick="decrypt()">Decrypt</button>
</div>

<div class="panel" id="output"></div>

<h3>Visualization</h3>
<div class="panel" id="visual"></div>

<h3>Steps</h3>
<div class="panel" id="steps"></div>

</div>

<script>

function error(msg){
document.getElementById("output").innerHTML="<span class='error'>"+msg+"</span>"
document.getElementById("visual").innerText=""
document.getElementById("steps").innerText=""
}

function caesar(text,shift,mode){

let res=""
let vis=""

for(let c of text){

if(/[a-z]/i.test(c)){

let base=c==c.toUpperCase()?65:97
let p=c.charCodeAt(0)-base
let r

if(mode=="enc")
r=(p+shift)%26
else
r=(p-shift+26)%26

res+=String.fromCharCode(r+base)

vis+=c+"("+p+") → "+r+" → "+String.fromCharCode(r+base)+"\n"

}
else res+=c

}

document.getElementById("visual").innerText=vis

document.getElementById("steps").innerText=
"Step1 Convert letters to numbers\n"+
"Step2 Apply formula (P ± key) mod 26\n"+
"Step3 Convert back to letters"

return res

}

function vigenere(text,key,mode){

key=key.toUpperCase()
text=text.toUpperCase()

let res=""
let vis=""

for(let i=0;i<text.length;i++){

let p=text.charCodeAt(i)-65
let k=key.charCodeAt(i%key.length)-65

let r

if(mode=="enc")
r=(p+k)%26
else
r=(p-k+26)%26

res+=String.fromCharCode(r+65)

vis+=text[i]+" + "+key[i%key.length]+" → "+String.fromCharCode(r+65)+"\n"

}

document.getElementById("visual").innerText=vis

document.getElementById("steps").innerText=
"Step1 Repeat key until plaintext length\n"+
"Step2 Convert letters to numbers\n"+
"Step3 Ci = (Pi + Ki) mod 26"

return res

}

function railEncrypt(text,key){

let rails=Array.from({length:key},()=>[])
let rail=0
let dir=1

for(let c of text){

rails[rail].push(c)
rail+=dir

if(rail==0||rail==key-1) dir*=-1

}

let vis=""

for(let r of rails)
vis+=r.join(" ")+"\n"

document.getElementById("visual").innerText=vis

document.getElementById("steps").innerText=
"Step1 Write text diagonally across rails\n"+
"Step2 Read row by row"

return rails.flat().join("")

}

function columnEncrypt(text,key){

let cols=key.length
let rows=Math.ceil(text.length/cols)

let grid=[]
let k=0

for(let r=0;r<rows;r++){

grid[r]=[]

for(let c=0;c<cols;c++)
grid[r][c]=text[k++]||"X"

}

let vis="Grid\n\n"

for(let r of grid)
vis+=r.join(" ")+"\n"

document.getElementById("visual").innerText=vis

document.getElementById("steps").innerText=
"Step1 Write plaintext row wise\n"+
"Step2 Rearrange columns using key order\n"+
"Step3 Read column wise"

let order=[...key].map((c,i)=>[c,i]).sort()

let res=""

for(let o of order)
for(let r=0;r<rows;r++)
res+=grid[r][o[1]]

return res

}

function playfairMatrix(key){

key=key.toUpperCase().replace(/J/g,"I")

let seen={}
let alphabet="ABCDEFGHIKLMNOPQRSTUVWXYZ"

let matrix=[]

for(let c of key+alphabet){

if(!seen[c]){
matrix.push(c)
seen[c]=true
}

}

let grid=[]
while(matrix.length)
grid.push(matrix.splice(0,5))

return grid

}

function playfairEncrypt(text,key){

let grid=playfairMatrix(key)

let vis="Playfair Matrix\n\n"

for(let r of grid)
vis+=r.join(" ")+"\n"

document.getElementById("visual").innerText=vis

document.getElementById("steps").innerText=
"Step1 Generate 5x5 key matrix\n"+
"Step2 Form digraph pairs\n"+
"Step3 Apply Playfair rules"

return "(Demo output)"

}

function hillEncrypt(text,key){

let k=key.split(",").map(Number)

let vis="Key Matrix\n"
vis+=k[0]+" "+k[1]+"\n"
vis+=k[2]+" "+k[3]

document.getElementById("visual").innerText=vis

document.getElementById("steps").innerText=
"Step1 Convert letters to numbers\n"+
"Step2 Multiply plaintext vector with key matrix\n"+
"Step3 Take mod 26"

return "(Demo output)"

}

function encrypt(){

let algo=document.getElementById("algo").value
let key=document.getElementById("key").value
let text=document.getElementById("text").value

if(text==""){
error("Enter text")
return
}

let out=""

if(algo=="caesar"){

if(isNaN(key)){
error("Caesar key must be a number")
return
}

out=caesar(text,parseInt(key),"enc")

}

if(algo=="vigenere"){

if(!/^[a-zA-Z]+$/.test(key)){
error("Vigenere key must contain letters only")
return
}

out=vigenere(text,key,"enc")

}

if(algo=="rail"){

if(isNaN(key)){
error("Rail Fence key must be numeric")
return
}

out=railEncrypt(text,parseInt(key))

}

if(algo=="column"){
out=columnEncrypt(text,key)
}

if(algo=="playfair"){
out=playfairEncrypt(text,key)
}

if(algo=="hill"){

if(key.split(",").length!=4){
error("Hill key must be like 3,3,2,5")
return
}

out=hillEncrypt(text,key)

}

document.getElementById("output").innerText=out

}

function decrypt(){
document.getElementById("steps").innerText="Decryption implemented similar to reverse operations"
document.getElementById("visual").innerText=""
document.getElementById("output").innerText="(Decryption demo)"
}

</script>

</body>
</html>

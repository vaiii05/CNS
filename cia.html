
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CNS Cryptography Toolkit</title>

<style>

body{
font-family: 'Segoe UI';
background: linear-gradient(135deg,#020617,#0f172a);
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
width:650px;
padding:30px;
border-radius:15px;
background:#0f172a;
box-shadow:0 0 40px rgba(0,255,255,0.2);
border:1px solid rgba(0,255,255,0.2);
}

h1{
text-align:center;
margin-bottom:25px;
color:#22d3ee;
letter-spacing:2px;
}

label{
margin-top:10px;
display:block;
font-size:14px;
color:#94a3b8;
}

select,input,textarea{
width:100%;
margin-top:5px;
padding:10px;
border-radius:8px;
border:none;
background:#020617;
color:white;
border:1px solid #1e293b;
}

textarea{
height:100px;
resize:none;
}

button{
width:48%;
padding:10px;
margin-top:15px;
border:none;
border-radius:8px;
background:#22d3ee;
color:black;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#06b6d4;
}

.buttons{
display:flex;
justify-content:space-between;
}

.result{
margin-top:20px;
background:#020617;
padding:15px;
border-radius:10px;
border:1px solid #1e293b;
min-height:50px;
word-wrap:break-word;
}

</style>
</head>

<body>

<div class="container">

<h1>CNS Crypto Toolkit</h1>

<label>Algorithm</label>
<select id="algo">
<option value="caesar">Caesar Cipher</option>
<option value="vigenere">Vigenere Cipher</option>
<option value="playfair">Playfair Cipher</option>
<option value="hill">Hill Cipher (2x2)</option>
<option value="rail">Rail Fence Cipher</option>
<option value="column">Row/Column Transposition</option>
</select>

<label>Key</label>
<input id="key" placeholder="Enter key / shift / keyword">

<label>Input Text</label>
<textarea id="text"></textarea>

<div class="buttons">
<button onclick="encrypt()">Encrypt</button>
<button onclick="decrypt()">Decrypt</button>
</div>

<div class="result" id="output"></div>

</div>

<script>

/* Caesar */

function caesar(text,shift,mode){

let result=""

for(let c of text){

if(/[a-z]/i.test(c)){

let base=c==c.toUpperCase()?65:97

let val=c.charCodeAt(0)-base

if(mode=="enc")
val=(val+shift)%26
else
val=(val-shift+26)%26

result+=String.fromCharCode(val+base)

}
else result+=c

}

return result
}


/* Vigenere */

function vigenere(text,key,mode){

key=key.toLowerCase()

let j=0
let result=""

for(let c of text){

if(/[a-z]/i.test(c)){

let base=c==c.toUpperCase()?65:97

let shift=key.charCodeAt(j%key.length)-97

let val=c.charCodeAt(0)-base

if(mode=="enc")
val=(val+shift)%26
else
val=(val-shift+26)%26

result+=String.fromCharCode(val+base)

j++

}
else result+=c

}

return result

}


/* Rail Fence */

function railEncrypt(text,key){

let rails=Array.from({length:key},()=>[])

let rail=0
let dir=1

for(let c of text){

rails[rail].push(c)

rail+=dir

if(rail==0||rail==key-1) dir*=-1

}

return rails.flat().join("")

}

function railDecrypt(cipher,key){

let arr=Array.from({length:key},()=>Array(cipher.length).fill(null))

let rail=0,dir=1

for(let i=0;i<cipher.length;i++){

arr[rail][i]="*"

rail+=dir

if(rail==0||rail==key-1) dir*=-1

}

let index=0

for(let r=0;r<key;r++)
for(let c=0;c<cipher.length;c++)
if(arr[r][c]=="*"&&index<cipher.length)
arr[r][c]=cipher[index++]

rail=0
dir=1
let res=""

for(let i=0;i<cipher.length;i++){

res+=arr[rail][i]

rail+=dir

if(rail==0||rail==key-1) dir*=-1

}

return res

}


/* Column Transposition */

function columnEncrypt(text,key){

let cols=key.length
let rows=Math.ceil(text.length/cols)

let grid=[]

let k=0

for(let r=0;r<rows;r++){

grid[r]=[]

for(let c=0;c<cols;c++)
grid[r][c]=text[k++]||"X"

}

let order=[...key].map((c,i)=>[c,i]).sort()

let result=""

for(let o of order)
for(let r=0;r<rows;r++)
result+=grid[r][o[1]]

return result

}


/* Playfair */

function playfairPrepare(key){

key=key.toUpperCase().replace(/J/g,"I")

let seen={}
let matrix=[]

let alphabet="ABCDEFGHIKLMNOPQRSTUVWXYZ"

key+=alphabet

for(let c of key){

if(!seen[c]){

matrix.push(c)
seen[c]=true

}

}

let grid=[]

while(matrix.length)
grid.push(matrix.splice(0,5))

return grid

}

function playfairEncrypt(text,key){

let grid=playfairPrepare(key)

text=text.toUpperCase().replace(/J/g,"I").replace(/ /g,"")

let pairs=[]

for(let i=0;i<text.length;i+=2){

let a=text[i]
let b=text[i+1]||"X"

if(a==b){
b="X"
i--
}

pairs.push([a,b])

}

let res=""

for(let p of pairs){

let r1,c1,r2,c2

for(let r=0;r<5;r++)
for(let c=0;c<5;c++){

if(grid[r][c]==p[0]){r1=r;c1=c}
if(grid[r][c]==p[1]){r2=r;c2=c}

}

if(r1==r2){

res+=grid[r1][(c1+1)%5]
res+=grid[r2][(c2+1)%5]

}
else if(c1==c2){

res+=grid[(r1+1)%5][c1]
res+=grid[(r2+1)%5][c2]

}
else{

res+=grid[r1][c2]
res+=grid[r2][c1]

}

}

return res

}


/* Hill Cipher 2x2 */

function hillEncrypt(text,key){

text=text.toUpperCase().replace(/ /g,"")

let k=key.split(",").map(Number)

let res=""

for(let i=0;i<text.length;i+=2){

let a=text.charCodeAt(i)-65
let b=text.charCodeAt(i+1)-65

let c1=(k[0]*a+k[1]*b)%26
let c2=(k[2]*a+k[3]*b)%26

res+=String.fromCharCode(c1+65)+String.fromCharCode(c2+65)

}

return res

}


/* Main */

function encrypt(){

let algo=document.getElementById("algo").value
let text=document.getElementById("text").value
let key=document.getElementById("key").value

let out=""

if(algo=="caesar") out=caesar(text,parseInt(key),"enc")
if(algo=="vigenere") out=vigenere(text,key,"enc")
if(algo=="rail") out=railEncrypt(text,parseInt(key))
if(algo=="column") out=columnEncrypt(text,key)
if(algo=="playfair") out=playfairEncrypt(text,key)
if(algo=="hill") out=hillEncrypt(text,key)

document.getElementById("output").innerText=out

}


function decrypt(){

let algo=document.getElementById("algo").value
let text=document.getElementById("text").value
let key=document.getElementById("key").value

let out=""

if(algo=="caesar") out=caesar(text,parseInt(key),"dec")
if(algo=="vigenere") out=vigenere(text,key,"dec")
if(algo=="rail") out=railDecrypt(text,parseInt(key))

document.getElementById("output").innerText=out

}

</script>

</body>
</html>


<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CNS</title>

<style>

body{
font-family:Inter, sans-serif;
background: radial-gradient(circle at top,#0f172a,#020617);
color:#e2e8f0;
margin:0;
padding:40px 20px;
}

.wrapper{
max-width:850px;
margin:auto;
}

h1{
text-align:center;
color:#38bdf8;
margin-bottom:30px;
}

label{
display:block;
margin-top:15px;
font-size:14px;
color:#94a3b8;
}

select,input,textarea{
width:100%;
padding:12px;
margin-top:6px;
border-radius:8px;
border:1px solid #1e293b;
background:#020617;
color:#e2e8f0;
font-size:14px;
}

textarea{
height:120px;
resize:none;
}

.buttons{
display:flex;
gap:12px;
margin-top:20px;
}

button{
flex:1;
padding:12px;
border-radius:8px;
border:none;
background:linear-gradient(135deg,#22d3ee,#06b6d4);
color:#020617;
font-weight:600;
cursor:pointer;
}

button:hover{
transform:translateY(-2px);
box-shadow:0 6px 15px rgba(34,211,238,0.3);
}

.flow{
text-align:center;
margin-top:15px;
color:#38bdf8;
}

.section{
margin-top:28px;
padding:18px;
border-radius:12px;
background:rgba(15,23,42,0.6);
border:1px solid rgba(148,163,184,0.15);
backdrop-filter:blur(8px);
}

.section h3{
margin-top:0;
color:#38bdf8;
}

.panel{
background:#020617;
border:1px solid #1e293b;
border-radius:8px;
padding:14px;
min-height:120px;
white-space:pre-wrap;
line-height:1.6;
overflow:auto;
}

.copy{
margin-top:10px;
padding:8px 14px;
background:#38bdf8;
border:none;
border-radius:6px;
cursor:pointer;
color:#020617;
font-weight:600;
}

.error{
color:#f87171;
}

</style>
</head>

<body>

<div class="wrapper">

<h1>CNS Cryptography Visualizer</h1>

<label>Algorithm</label>
<select id="algo">
<option value="caesar">Caesar Cipher</option>
<option value="vigenere">Vigenere Cipher</option>
<option value="playfair">Playfair Cipher</option>
<option value="hill">Hill Cipher (2x2)</option>
<option value="rail">Rail Fence Cipher</option>
<option value="column">Row/Column Transposition</option>
</select>

<label>Key</label>
<input id="key" placeholder="Enter key">

<label>Input Text</label>
<textarea id="text"></textarea>

<div class="buttons">
<button onclick="encrypt()">Encrypt</button>
<button onclick="decrypt()">Decrypt</button>
</div>

<div class="flow">
Plaintext → Encryption Algorithm → Ciphertext
</div>

<div class="section">
<h3>Output</h3>
<div class="panel" id="output"></div>
<button class="copy" onclick="copyOutput()">Copy Output</button>
</div>

<div class="section">
<h3>Visualization</h3>
<div class="panel" id="visual"></div>
</div>

<div class="section">
<h3>Steps</h3>
<div class="panel" id="steps"></div>
</div>

</div>

<script>

function error(msg){
document.getElementById("output").innerHTML="<span class='error'>"+msg+"</span>"
document.getElementById("visual").innerText=""
document.getElementById("steps").innerText=""
}

function copyOutput(){
navigator.clipboard.writeText(document.getElementById("output").innerText)
}

/* Caesar */

function caesar(text,shift,mode){

let res=""
let vis=""

for(let c of text){

if(/[a-z]/i.test(c)){

let base=c==c.toUpperCase()?65:97
let p=c.charCodeAt(0)-base
let r

if(mode=="enc") r=(p+shift)%26
else r=(p-shift+26)%26

res+=String.fromCharCode(r+base)

vis+=c+"("+p+") → "+r+" → "+String.fromCharCode(r+base)+"\n"

}
else res+=c

}

document.getElementById("visual").innerText=vis

document.getElementById("steps").innerText=
"1 Convert letters to numbers\n"+
"2 Apply (P ± key) mod 26\n"+
"3 Convert numbers back"

return res

}

/* Vigenere */

function vigenere(text,key,mode){

key=key.toUpperCase()
text=text.toUpperCase()

let res=""
let vis=""

for(let i=0;i<text.length;i++){

if(!/[A-Z]/.test(text[i])){
res+=text[i]
continue
}

let p=text.charCodeAt(i)-65
let k=key.charCodeAt(i%key.length)-65

let r

if(mode=="enc") r=(p+k)%26
else r=(p-k+26)%26

res+=String.fromCharCode(r+65)

vis+=text[i]+" + "+key[i%key.length]+" → "+String.fromCharCode(r+65)+"\n"

}

document.getElementById("visual").innerText=vis

document.getElementById("steps").innerText=
"1 Repeat key\n2 Convert to numbers\n3 Apply formula"

return res

}

/* Rail Fence */

function railEncrypt(text,key){

let rails=Array.from({length:key},()=>[])
let rail=0
let dir=1

for(let c of text){

rails[rail].push(c)

rail+=dir

if(rail==0||rail==key-1) dir*=-1

}

let vis=""

for(let r of rails)
vis+=r.join(" ")+"\n"

document.getElementById("visual").innerText=vis

return rails.flat().join("")

}

function railDecrypt(cipher,key){

let arr=Array.from({length:key},()=>Array(cipher.length).fill(null))

let rail=0
let dir=1

for(let i=0;i<cipher.length;i++){

arr[rail][i]="*"

rail+=dir

if(rail==0||rail==key-1) dir*=-1

}

let index=0

for(let r=0;r<key;r++)
for(let c=0;c<cipher.length;c++)
if(arr[r][c]=="*" && index<cipher.length)
arr[r][c]=cipher[index++]

rail=0
dir=1
let res=""

for(let i=0;i<cipher.length;i++){

res+=arr[rail][i]

rail+=dir

if(rail==0||rail==key-1) dir*=-1

}

document.getElementById("visual").innerText="Rail structure reconstructed"

return res

}

/* Column Transposition */

function columnEncrypt(text,key){

let cols=key.length
let rows=Math.ceil(text.length/cols)

let grid=[]
let k=0

for(let r=0;r<rows;r++){

grid[r]=[]

for(let c=0;c<cols;c++)
grid[r][c]=text[k++]||"X"

}

let vis="Grid\n\n"

for(let r of grid)
vis+=r.join(" ")+"\n"

document.getElementById("visual").innerText=vis

let order=[...key].map((c,i)=>[c,i]).sort()

let res=""

for(let o of order)
for(let r=0;r<rows;r++)
res+=grid[r][o[1]]

return res

}

function columnDecrypt(cipher,key){

let cols=key.length
let rows=Math.ceil(cipher.length/cols)

let grid=Array.from({length:rows},()=>Array(cols))

let order=[...key].map((c,i)=>[c,i]).sort()

let index=0

for(let o of order)
for(let r=0;r<rows;r++)
grid[r][o[1]]=cipher[index++]||""

let res=""

for(let r=0;r<rows;r++)
for(let c=0;c<cols;c++)
res+=grid[r][c]

document.getElementById("visual").innerText="Column grid reconstructed"

return res

}

/* Controller */

function encrypt(){

let algo=document.getElementById("algo").value
let key=document.getElementById("key").value
let text=document.getElementById("text").value

if(text==""){ error("Enter input text"); return }

let out=""

if(algo=="caesar"){
if(isNaN(key)){ error("Key must be number"); return }
out=caesar(text,parseInt(key),"enc")
}

if(algo=="vigenere"){
if(!/^[a-zA-Z]+$/.test(key)){ error("Key must be letters"); return }
out=vigenere(text,key,"enc")
}

if(algo=="rail"){
if(isNaN(key)){ error("Key must be numeric"); return }
out=railEncrypt(text,parseInt(key))
}

if(algo=="column"){
out=columnEncrypt(text,key)
}

document.getElementById("output").innerText=out

}

function decrypt(){

let algo=document.getElementById("algo").value
let key=document.getElementById("key").value
let text=document.getElementById("text").value

let out=""

if(algo=="caesar") out=caesar(text,parseInt(key),"dec")
if(algo=="vigenere") out=vigenere(text,key,"dec")
if(algo=="rail") out=railDecrypt(text,parseInt(key))
if(algo=="column") out=columnDecrypt(text,key)

document.getElementById("output").innerText=out

}

</script>

</body>
</html>


<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CNS Cryptography Toolkit</title>

<style>

body{
font-family:Inter,sans-serif;
background:linear-gradient(135deg,#020617,#0f172a);
color:#e2e8f0;
margin:0;
padding:40px 20px;
}

.wrapper{
max-width:900px;
margin:auto;
}

h1{
text-align:center;
color:#38bdf8;
margin-bottom:30px;
}

label{
display:block;
margin-top:15px;
color:#94a3b8;
}

select,input,textarea{
width:100%;
padding:12px;
margin-top:6px;
border-radius:8px;
border:1px solid #1e293b;
background:#020617;
color:white;
}

textarea{
height:120px;
}

.buttons{
display:flex;
gap:12px;
margin-top:20px;
}

button{
flex:1;
padding:12px;
border:none;
border-radius:8px;
background:#22d3ee;
color:#020617;
font-weight:600;
cursor:pointer;
}

button:hover{
transform:translateY(-2px);
box-shadow:0 6px 15px rgba(34,211,238,0.3);
}

.section{
margin-top:28px;
padding:18px;
border-radius:12px;
background:rgba(15,23,42,0.7);
border:1px solid rgba(148,163,184,0.2);
}

.panel{
background:#020617;
border:1px solid #1e293b;
border-radius:8px;
padding:14px;
min-height:120px;
white-space:pre-wrap;
overflow:auto;
}

.copy{
margin-top:10px;
padding:8px 14px;
background:#38bdf8;
border:none;
border-radius:6px;
cursor:pointer;
color:#020617;
}

.error{
color:#f87171;
}

</style>
</head>

<body>

<div class="wrapper">

<h1>CNS Cryptography Toolkit</h1>

<label>Algorithm</label>
<select id="algo">
<option value="caesar">Caesar Cipher</option>
<option value="vigenere">Vigenere Cipher</option>
<option value="playfair">Playfair Cipher</option>
<option value="hill">Hill Cipher (2x2)</option>
<option value="rail">Rail Fence Cipher</option>
<option value="column">Row/Column Transposition</option>
</select>

<label>Key</label>
<input id="key" placeholder="Enter key">

<label>Input Text</label>
<textarea id="text"></textarea>

<div class="buttons">
<button onclick="encrypt()">Encrypt</button>
<button onclick="decrypt()">Decrypt</button>
</div>

<div class="section">
<h3>Output</h3>
<div class="panel" id="output"></div>
<button class="copy" onclick="copyOutput()">Copy Output</button>
</div>

<div class="section">
<h3>Visualization</h3>
<div class="panel" id="visual"></div>
</div>

<div class="section">
<h3>Steps</h3>
<div class="panel" id="steps"></div>
</div>

</div>

<script>

/* utility */

function error(msg){
document.getElementById("output").innerHTML="<span class='error'>"+msg+"</span>"
}

function copyOutput(){
navigator.clipboard.writeText(document.getElementById("output").innerText)
}

/* Caesar */

function caesar(text,key,mode){

let res=""
let vis=""

for(let c of text){

if(/[a-z]/i.test(c)){

let base=c==c.toUpperCase()?65:97
let p=c.charCodeAt(0)-base
let r

if(mode=="enc") r=(p+key)%26
else r=(p-key+26)%26

res+=String.fromCharCode(r+base)

vis+=c+" → "+String.fromCharCode(r+base)+"\n"

}
else res+=c
}

document.getElementById("visual").innerText=vis

document.getElementById("steps").innerText=
"Formula: C = (P + k) mod 26\n"+
"Decryption: P = (C - k) mod 26"

return res

}

/* Vigenere */

function vigenere(text,key,mode){

key=key.toUpperCase()
text=text.toUpperCase()

let res=""
let vis=""

for(let i=0;i<text.length;i++){

let c=text[i]

if(!/[A-Z]/.test(c)){
res+=c
continue
}

let p=c.charCodeAt(0)-65
let k=key.charCodeAt(i%key.length)-65

let r

if(mode=="enc") r=(p+k)%26
else r=(p-k+26)%26

res+=String.fromCharCode(r+65)

vis+=c+" + "+key[i%key.length]+" → "+String.fromCharCode(r+65)+"\n"

}

document.getElementById("visual").innerText=vis

document.getElementById("steps").innerText=
"Ci = (Pi + Ki) mod 26\n"+
"Pi = (Ci - Ki) mod 26"

return res

}

/* Rail Fence */

function railEncrypt(text,key){

let rail=0
let dir=1
let rails=Array.from({length:key},()=>[])

for(let c of text){

rails[rail].push(c)

rail+=dir
if(rail==0||rail==key-1) dir*=-1

}

let vis=""
for(let r of rails) vis+=r.join(" ")+"\n"

document.getElementById("visual").innerText=vis

return rails.flat().join("")

}

function railDecrypt(cipher,key){

let pattern=[]
let rail=0,dir=1

for(let i=0;i<cipher.length;i++){
pattern.push(rail)
rail+=dir
if(rail==0||rail==key-1) dir*=-1
}

let rails=Array.from({length:key},()=>[])
let index=0

for(let r=0;r<key;r++){
for(let i=0;i<pattern.length;i++){
if(pattern[i]==r) rails[r].push(cipher[index++])
}
}

let result=""
let railIndex=Array(key).fill(0)

for(let p of pattern){
result+=rails[p][railIndex[p]++]
}

document.getElementById("visual").innerText="Zigzag pattern reconstructed"

return result

}

/* Column Transposition */

function columnEncrypt(text,key){

let cols=key.length
let rows=Math.ceil(text.length/cols)

let grid=[]
let k=0

for(let r=0;r<rows;r++){
grid[r]=[]
for(let c=0;c<cols;c++)
grid[r][c]=text[k++]||"X"
}

let order=[...key].map((c,i)=>[c,i]).sort()

let res=""

for(let o of order){
for(let r=0;r<rows;r++)
res+=grid[r][o[1]]
}

let vis=""
for(let r of grid) vis+=r.join(" ")+"\n"

document.getElementById("visual").innerText=vis

return res

}

function columnDecrypt(cipher,key){

let cols=key.length
let rows=Math.ceil(cipher.length/cols)

let grid=Array.from({length:rows},()=>Array(cols))

let order=[...key].map((c,i)=>[c,i]).sort()

let index=0

for(let o of order){
for(let r=0;r<rows;r++){
grid[r][o[1]]=cipher[index++]
}
}

let res=""

for(let r=0;r<rows;r++)
for(let c=0;c<cols;c++)
res+=grid[r][c]

document.getElementById("visual").innerText="Column grid reconstructed"

return res

}

/* Playfair */

function playfairMatrix(key){

key=key.toUpperCase().replace(/J/g,"I")

let alphabet="ABCDEFGHIKLMNOPQRSTUVWXYZ"
let seen={}
let matrix=[]

for(let c of key+alphabet){
if(!seen[c]){
matrix.push(c)
seen[c]=true
}
}

let grid=[]
while(matrix.length) grid.push(matrix.splice(0,5))

return grid

}

function findPos(grid,c){
for(let r=0;r<5;r++)
for(let c2=0;c2<5;c2++)
if(grid[r][c2]==c) return [r,c2]
}

function playfair(text,key,mode){

let grid=playfairMatrix(key)
text=text.toUpperCase().replace(/J/g,"I").replace(/ /g,"")

let pairs=[]

for(let i=0;i<text.length;i+=2){

let a=text[i]
let b=text[i+1]||"X"

if(a==b){
b="X"
i--
}

pairs.push([a,b])

}

let res=""

for(let p of pairs){

let [r1,c1]=findPos(grid,p[0])
let [r2,c2]=findPos(grid,p[1])

if(r1==r2){

if(mode=="enc"){
res+=grid[r1][(c1+1)%5]
res+=grid[r2][(c2+1)%5]
}
else{
res+=grid[r1][(c1+4)%5]
res+=grid[r2][(c2+4)%5]
}

}

else if(c1==c2){

if(mode=="enc"){
res+=grid[(r1+1)%5][c1]
res+=grid[(r2+1)%5][c2]
}
else{
res+=grid[(r1+4)%5][c1]
res+=grid[(r2+4)%5][c2]
}

}

else{

res+=grid[r1][c2]
res+=grid[r2][c1]

}

}

document.getElementById("visual").innerText="5x5 key matrix generated"

return res

}

/* Hill Cipher */

function modInv(a,m){

a=(a%m+m)%m

for(let x=1;x<m;x++)
if((a*x)%m==1) return x

return 1

}

function hillEncrypt(text,key){

let k=key.split(",").map(Number)

text=text.toUpperCase().replace(/ /g,"")

let res=""

for(let i=0;i<text.length;i+=2){

let a=text.charCodeAt(i)-65
let b=text.charCodeAt(i+1)-65

let c1=(k[0]*a+k[1]*b)%26
let c2=(k[2]*a+k[3]*b)%26

res+=String.fromCharCode(c1+65)+String.fromCharCode(c2+65)

}

document.getElementById("visual").innerText="Matrix multiplication applied"

return res

}

function hillDecrypt(text,key){

let k=key.split(",").map(Number)

let det=(k[0]*k[3]-k[1]*k[2])%26
let invDet=modInv(det,26)

let inv=[
(k[3]*invDet)%26,
((-k[1]+26)*invDet)%26,
((-k[2]+26)*invDet)%26,
(k[0]*invDet)%26
]

let res=""

for(let i=0;i<text.length;i+=2){

let a=text.charCodeAt(i)-65
let b=text.charCodeAt(i+1)-65

let p1=(inv[0]*a+inv[1]*b)%26
let p2=(inv[2]*a+inv[3]*b)%26

res+=String.fromCharCode(p1+65)+String.fromCharCode(p2+65)

}

document.getElementById("visual").innerText="Inverse matrix applied"

return res

}

/* Controller */

function encrypt(){

let algo=document.getElementById("algo").value
let key=document.getElementById("key").value
let text=document.getElementById("text").value

let out=""

if(algo=="caesar") out=caesar(text,parseInt(key),"enc")
if(algo=="vigenere") out=vigenere(text,key,"enc")
if(algo=="rail") out=railEncrypt(text,parseInt(key))
if(algo=="column") out=columnEncrypt(text,key)
if(algo=="playfair") out=playfair(text,key,"enc")
if(algo=="hill") out=hillEncrypt(text,key)

document.getElementById("output").innerText=out

}

function decrypt(){

let algo=document.getElementById("algo").value
let key=document.getElementById("key").value
let text=document.getElementById("text").value

let out=""

if(algo=="caesar") out=caesar(text,parseInt(key),"dec")
if(algo=="vigenere") out=vigenere(text,key,"dec")
if(algo=="rail") out=railDecrypt(text,parseInt(key))
if(algo=="column") out=columnDecrypt(text,key)
if(algo=="playfair") out=playfair(text,key,"dec")
if(algo=="hill") out=hillDecrypt(text,key)

document.getElementById("output").innerText=out

}

</script>

</body>
</html>
